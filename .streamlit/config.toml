[theme]
primaryColor = "#1A6FAD"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8F9FA"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
port = 8501
headless = true
runOnSave = true
maxUploadSize = 200

[logger]
level = "error"

[browser]
gatherUsageStats = false
serverAddress = "localhost"
